<!DOCTYPE html>
<html>
<head>
    <title>LinkSite</title>

    <style>
        body {
            background-color: black;
            color: #b026ff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: 50px;
            margin-top: 40px;
            text-shadow: 0 0 15px #b026ff;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            margin-top: 50px;
        }

        .link {
            margin: 20px 0;
            font-size: 22px;
        }

        a {
            color: #d580ff;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: white;
            text-shadow: 0 0 10px #b026ff;
        }
    </style>
</head>

<body>

    <h1>LinkSite</h1>

    <div class="container">

        <div class="link">1. <a href="https://google.com" target="_blank">Google</a></div>
        <div class="link">2. <a href="https://docs.google.com" target="_blank">Google Docs</a></div>

    </div>

</body>
</html>
